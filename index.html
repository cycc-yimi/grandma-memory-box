<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>阿嬤的時光寶盒</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #e5ddd5;
}

.chat {
  max-width: 600px;
  margin: auto;
  padding: 15px;
  padding-bottom: 120px;
}

.msg {
  padding: 10px 12px;
  margin: 8px 0;
  border-radius: 12px;
  max-width: 75%;
  display: inline-block;
  clear: both;
  line-height: 1.4;
}

.left {
  background: white;
  float: left;
}

.right {
  background: #dcf8c6;
  float: right;
}

.options {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
  display: flex;
  gap: 10px;
}

button {
  flex: 1;
  padding: 12px;
  border: none;
  background: #4caf50;
  color: white;
  border-radius: 8px;
  font-size: 14px;
}
</style>

</head>

<body>

<div class="chat" id="chat">

  <div class="msg left">🧺 阿嬤：旅人，你終於來了…</div>
  <div class="msg left">🐱 赤靈：這個地方的記憶正在消失。</div>
  <div class="msg left">📜 旁白：時光寶盒正在啟動。</div>

</div>

<div class="options">
  <button onclick="choose(1)">幫忙找茶壺</button>
  <button onclick="choose(2)">先聽故事</button>
</div>

<script>

function addMsg(side, text){
  document.getElementById("chat").innerHTML +=
  `<div class="msg ${side}">${text}</div>`;
  
  window.scrollTo(0, document.body.scrollHeight);
}

function choose(option){

  if(option === 1){
    addMsg("right", "我幫你找！");
    
    setTimeout(() => {
      addMsg("left", "🐱 赤靈：很好，我感覺到茶壺在舊倉庫。");
    }, 600);
  }

  if(option === 2){
    addMsg("right", "我想先聽故事");
    
    setTimeout(() => {
      addMsg("left", "🧺 阿嬤：那個茶壺，是我年輕時的回憶…");
    }, 600);
  }

}

</script>

</body>
</html>
