<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>赤蘭溪闖關遊戲</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="topbar" aria-label="遊戲狀態">
        <div>
          <p class="eyebrow">Quest Quiz</p>
          <h1>赤蘭溪闖關遊戲</h1>
        </div>
        <div class="score-card">
          <span>目前點數</span>
          <strong id="points">0</strong>
          <small>/ 10</small>
        </div>
      </section>

      <section class="progress-panel" aria-label="關卡進度">
        <div id="levelList" class="level-list"></div>
        <div class="progress-track">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </section>

      <section id="gamePanel" class="game-panel"></section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
